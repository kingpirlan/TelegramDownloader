name: 📝 Telegram Text Downloader

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: '🔗 Telegram Link'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup
        run: |
          sudo apt update -qq
          sudo apt install -y curl grep sed jq
          
      - name: Extract Text
        id: text
        run: |
          URL="${{ github.event.inputs.telegram_link }}"
          
          echo "Processing: $URL"
          
          CH=$(echo "$URL" | sed 's|https\?://[^/]\+/||;s|/.*||')
          ID=$(echo "$URL" | sed 's|.*/||')
          
          HTML=$(curl -s "$URL" -H "User-Agent: Mozilla/5.0")
          
          CAPTION=$(echo "$HTML" | grep -A10 "tgme_widget_message_text" | grep -o '">[^"]\{20,\}<' | sed 's/">//;s/<.*//' | head -1 | sed 's/"/"/g;s/&/\&/g')
          
          if [ -z "$CAPTION" ]; then
            CAPTION=$(echo "$HTML" | grep -o '<title>.*</title>' | sed 's/<title>\(.*\) - Telegram<\/title>/\1/')
          fi
          
          if [ -z "$CAPTION" ]; then
            CAPTION="No caption found"
          fi
          
          LEN=${#CAPTION}
          
          echo "Channel: $CH"
          echo "Caption ($LEN chars): ${CAPTION:0:100}"
          
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$CAPTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "channel=$CH" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT
          
      - name: Save Files
        run: |
          TEXT="${{ steps.text.outputs.text }}"
          CH="${{ steps.text.outputs.channel }}"
          ID="${{ steps.text.outputs.id }}"
          
          mkdir -p texts/$CH
          
          echo "$TEXT" > texts/$CH/$ID.txt
          
          cat > texts/$CH/$ID.md << END
# @$CH - Post $ID

**Link:** ${{ github.event.inputs.telegram_link }} Length:** ${#TEXT} chars

\`\`\`
$TEXT
\`\`\`
END
          
          echo "Saved: texts/$CH/$ID.*"
          
      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add texts/
          git commit -m "Add @$CH post $ID [skip ci]" || exit 0
          git push || exit 0
