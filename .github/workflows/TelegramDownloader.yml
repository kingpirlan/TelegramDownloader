name: 📝 Telegram Text/Caption Downloader

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: '🔗 Telegram post link (t.me/...)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  extract-text:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📂 Clone repository
        uses: actions/checkout@v4

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq grep sed

      - name: 📡 Extract TEXT/Caption
        id: extract
        run: |
          LINK="${{ github.event.inputs.telegram_link }}"
          echo "🔗 $LINK"
          
          # Extract channel/post ID
          CHANNEL=$(echo "$LINK" | sed 's|https\?://t\.me/||;s|/.*||')
          POST_ID=$(echo "$LINK" | sed 's|.*/||;s|s/||')
          
          echo "👥 @$CHANNEL | #$POST_ID"
          
          # Download page
          HTML=$(curl -s --http1.1 --max-time 30 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/html" \
            "$LINK")
          
          # ✅ FIXED: Simple grep patterns (no PCRE)
          TEXT=$(echo "$HTML" | grep -i 'tgme_widget_message_text' -A 10 | \
            sed -n '/tgme_widget_message_text/,/\/div/p' | \
            sed 's/<[^>]*>//g' | \
            sed 's/"/"/g;s/&/\&/g;s/</</g;s/>/>/g;s/  / /g' | \
            tr -d '\r' | sed 's/<br>//g' | \
            sed 's/^[ \t]*//;s/[ \t]*$//' | sed 's/  */ /g' | head -c 5000)
          
          # Fallback 1: Any div with text
          if [ -z "$TEXT" ] || [ ${#TEXT} -lt 5 ]; then
            TEXT=$(echo "$HTML" | grep -o '<div[^>]*>[^<]\{20,\}</div>' | \
              head -3 | sed 's/<[^>]*>//g' | tr -d '\n' | sed 's/  */ /g' | head -c 1000)
          fi
          
          # Fallback 2: Title or meta
          if [ -z "$TEXT" ] || [ ${#TEXT} -lt 5 ]; then
            TEXT=$(echo "$HTML" | grep -o '<title>.*</title>' | sed 's/<[^>]*>//g')
          fi
          
          # Clean & finalize
          TEXT=$(echo "$TEXT" | sed 's/^"//;s/"$//' | sed 's/^[ \t]*//;s/[ \t]*$//' | sed 's/  */ /g')
          
          [ -z "$TEXT" ] && TEXT="[متن یافت نشد]"
          
          LENGTH=${#TEXT}
          echo "✅ $LENGTH کاراکتر"
          echo "📝 ${TEXT:0:80}..."
          
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "post_id=$POST_ID" >> $GITHUB_OUTPUT
          echo "length=$LENGTH" >> $GITHUB_OUTPUT

      - name: 💾 Save files (FIXED)
        run: |
          TEXT="${{ steps.extract.outputs.text }}"
          CHANNEL="${{ steps.extract.outputs.channel }}"
          POST_ID="${{ steps.extract.outputs.post_id }}"
          LENGTH="${{ steps.extract.outputs.length }}"
          LINK="${{ github.event.inputs.telegram_link }}"
          
          mkdir -p "texts/$CHANNEL"
          
          # 1. TXT (simple)
          echo "$TEXT" > "texts/$CHANNEL/post_${POST_ID}.txt"
          
          # 2. MD (fixed quoting)
          cat > "texts/$CHANNEL/post_${POST_ID}.md" << 'MDEND'
# 📝 @CHANNEL@ - POST_ID
**لینک:** LINK تاریخ:** DATE
**طول:** LENGTH چ

---
