name: 📝 Telegram Text
on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: 'Telegram Link'
        required: true
        type: string
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get Text
        id: text
        run: |
          URL="${{ github.event.inputs.telegram_link }}"
          CH=$(echo "$URL" | sed 's|.*/||;s|/.*||')
          HTML=$(curl -s "$URL")
          CAPTION=$(echo "$HTML" | grep -A5 "tgme_widget_message_text" | sed 's/<[^>]*>//g' | tr -d '\n' | sed 's/"/"/g' | head -c 1000)
          [ -z "$CAPTION" ] && CAPTION="No text"
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$CAPTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "channel=$CH" >> $GITHUB_OUTPUT
      - name: Save
        run: |
          mkdir -p texts/${{ steps.text.outputs.channel }}
          echo "${{ steps.text.outputs.text }}" > texts/${{ steps.text.outputs.channel }}/text.txt
      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@ex.com"
          git add .
          git commit -m "text" || exit 0
          git push
